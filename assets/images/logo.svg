<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef5350;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8a80;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ef5350" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ef5350" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="120" height="120" rx="20" fill="transparent"/>
  <text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="52" font-weight="900"
        fill="url(#grad)" filter="url(#shadow)">IY</text>
</svg>
