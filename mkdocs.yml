  - "🎯 Этап №0: Подготовка к продакшну":
      - "etap0/index.md"
  - "🎚️ Этап №2: Сведение и VST Плагины":
      - "tom3/index.md"
      - "🔀 Сведение (mixing)": "tom3/mixing.md"
      - "💿 Мастеринг": "tom3/mastering.md"
  - "🎼 Этап №5: Теория музыки для продюсеров":
      - "etap5/index.md"
      - "📝 Нотная грамота": "etap5/notnaya-gramota.md"
      - "🎵 Аккорды и гармония": "etap5/akkordy.md"
      - "🥁 Ритм и перкуссия": "etap5/ritm.md"
  - "🗺️ Маршрут обучения": "roadmap.md"
  - "🔌 Плагины — подборка":
      - "plugins/index.md"
      - "📦 Подборка от Meraki": "plugins/meraki-collection.md"
      - "🏛️ Waves Abbey Road": "plugins/waves-abbey-road.md"
      - "🎙️ Waves CLA": "plugins/waves-cla.md"
      - "🎚️ Waves MannyM": "plugins/waves-mannym.md"
      - "🏎️ Waves Maserati": "plugins/waves-maserati.md"
  - "🎤 Основы звукозаписи":
